<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="assets/Logo/CGPWMUlogosm.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CG-PWMU | DIGITAL PLATFORM</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Mukta:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-background text-gray-800">
    <script>
        window.addEventListener('error', e => {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;width:100%;word-wrap:break-word;';
            errDiv.innerText = 'JS ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
            document.body.appendChild(errDiv);
        });
        window.addEventListener('unhandledrejection', e => {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:50px;left:0;z-index:9999;background:darkred;color:white;padding:20px;width:100%;word-wrap:break-word;';
            errDiv.innerText = 'PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
            document.body.appendChild(errDiv);
        });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
